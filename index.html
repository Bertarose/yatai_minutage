<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Minutage YATAI MTL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf7;
  --bg-card: #ffffff;
  --bg-soft: #f4f3ee;
  --ink: #0a0a0a;
  --ink-2: #404040;
  --ink-3: #737373;
  --ink-4: #a3a3a3;
  --line: #e7e5e0;
  --line-soft: #f0eee8;
  --accent: #c41e3a;
  --accent-soft: #fef2f3;
  --warm: #d4a574;
  --live: #00875a;
  --live-soft: #e8f5ee;
  --shadow-sm: 0 1px 2px rgba(10,10,10,0.04);
  --shadow-md: 0 4px 12px rgba(10,10,10,0.06);
  --shadow-lg: 0 12px 32px rgba(10,10,10,0.08);
  --radius: 4px;
  --radius-lg: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom);
}

/* === LAYOUT === */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
}

@media (max-width: 640px) {
  .container { padding: 0 16px; }
}

/* === HEADER === */
.header {
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(250,250,247,0.92);
}

.header-inner {
  padding: 20px 0 16px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}

.brand-mark {
  font-family: 'Figtree', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.025em;
  color: var(--ink);
}

.brand-mark::before {
  content: "●";
  color: var(--accent);
  margin-right: 8px;
  font-size: 10px;
  vertical-align: middle;
}

.brand-divider {
  color: var(--ink-4);
  font-weight: 300;
}

.brand-sub {
  font-size: 13px;
  color: var(--ink-3);
  font-weight: 500;
  letter-spacing: 0.02em;
}

.event-meta {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--ink-3);
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 6px;
}

.event-meta span { display: inline-block; }
.event-meta strong { color: var(--ink); font-weight: 600; }

/* === SEARCH BAR === */
.toolbar {
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 14px 0;
}

.search-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.search {
  flex: 1;
  position: relative;
}

.search input {
  width: 100%;
  border: 1px solid var(--line);
  background: var(--bg-card);
  padding: 10px 14px 10px 40px;
  font-family: inherit;
  font-size: 14px;
  color: var(--ink);
  border-radius: var(--radius);
  transition: all 0.15s ease;
  outline: none;
}

.search input:focus {
  border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(10,10,10,0.06);
}

.search input::placeholder { color: var(--ink-4); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-4);
  font-size: 14px;
  pointer-events: none;
}

.btn-clear {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--bg-soft);
  border: none;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  cursor: pointer;
  color: var(--ink-3);
  font-size: 14px;
  line-height: 1;
  display: none;
  align-items: center;
  justify-content: center;
}

.btn-clear.visible { display: flex; }
.btn-clear:hover { background: var(--ink); color: white; }

.btn-now {
  border: 1px solid var(--ink);
  background: var(--ink);
  color: white;
  padding: 10px 16px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border-radius: var(--radius);
  letter-spacing: 0.02em;
  transition: all 0.15s ease;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-now:hover { background: var(--accent); border-color: var(--accent); }

.btn-now::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--live);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,135,90,0.6); }
  50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0,135,90,0); }
}

/* === DAYS NAV === */
.days-nav {
  display: flex;
  gap: 0;
  overflow-x: auto;
  padding: 12px 0 0;
  margin: 0 -24px;
  padding-left: 24px;
  padding-right: 24px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

@media (max-width: 640px) {
  .days-nav { margin: 0 -16px; padding-left: 16px; padding-right: 16px; }
}

.days-nav::-webkit-scrollbar { display: none; }

.day-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 10px 14px 12px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-3);
  white-space: nowrap;
  transition: all 0.15s ease;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  min-width: 0;
}

.day-btn .day-name {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  color: inherit;
}

.day-btn .day-num {
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.02em;
}

.day-btn .day-phase {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-4);
  margin-top: 2px;
}

.day-btn:hover { color: var(--ink); }
.day-btn:hover .day-phase { color: var(--ink-3); }

.day-btn.active {
  border-bottom-color: var(--accent);
  color: var(--ink);
}

.day-btn.active .day-phase { color: var(--accent); font-weight: 600; }

/* === FILTERS === */
.filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 14px 0;
  border-bottom: 1px solid var(--line-soft);
}

.chip {
  border: 1px solid var(--line);
  background: var(--bg-card);
  padding: 5px 11px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-2);
  cursor: pointer;
  border-radius: 999px;
  transition: all 0.12s ease;
  letter-spacing: 0.01em;
}

.chip:hover { border-color: var(--ink); color: var(--ink); }

.chip.active {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}

.chip-count {
  display: inline-block;
  margin-left: 4px;
  opacity: 0.5;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}

/* === DAY HEADING === */
.day-heading {
  margin: 32px 0 16px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 20px;
  flex-wrap: wrap;
}

.day-heading h2 {
  font-family: 'Figtree', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  color: var(--ink);
}

.day-heading .day-stats {
  font-size: 12px;
  color: var(--ink-3);
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* === EVENT CARDS === */
.events {
  padding-bottom: 80px;
}

.event {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 20px;
  padding: 18px 0;
  border-bottom: 1px solid var(--line-soft);
  transition: background 0.15s ease;
  position: relative;
}

@media (max-width: 640px) {
  .event {
    grid-template-columns: 64px 1fr;
    gap: 14px;
    padding: 16px 0;
  }
}

.event:hover { background: var(--bg-soft); margin: 0 -16px; padding-left: 16px; padding-right: 16px; }

.event.live {
  background: var(--live-soft);
  margin: 0 -16px;
  padding: 18px 16px;
  border-radius: var(--radius-lg);
  border: 1px solid #b8e0c8;
  border-bottom-color: #b8e0c8;
}

.event.live::before {
  content: "EN COURS";
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 9px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--live);
  background: white;
  padding: 3px 7px;
  border-radius: 3px;
  border: 1px solid #b8e0c8;
}

.event-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.01em;
  padding-top: 1px;
}

.event-time.no-time { color: var(--ink-4); font-weight: 400; }

.event-body { min-width: 0; }

.event-task {
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.45;
  margin-bottom: 8px;
  word-wrap: break-word;
}

.event-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  font-size: 12px;
  color: var(--ink-3);
  align-items: center;
}

.event-meta-row > span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.event-meta-row .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-4);
}

.event-meta-row .value { color: var(--ink-2); font-weight: 500; }

.zone-tag {
  display: inline-block;
  padding: 2px 8px;
  background: var(--bg-soft);
  color: var(--ink-2);
  font-size: 11px;
  font-weight: 500;
  border-radius: 3px;
  letter-spacing: 0.01em;
}

.event-notes {
  margin-top: 8px;
  font-size: 13px;
  color: var(--ink-3);
  font-style: italic;
  border-left: 2px solid var(--line);
  padding-left: 10px;
  line-height: 1.5;
}

/* === EMPTY STATE === */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-3);
}

.empty-icon {
  font-size: 32px;
  margin-bottom: 12px;
  opacity: 0.4;
}

.empty-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--ink-2);
  margin-bottom: 4px;
}

.empty-sub {
  font-size: 13px;
  color: var(--ink-3);
}

/* === HIGHLIGHT (search) === */
mark {
  background: #fef3c7;
  color: var(--ink);
  padding: 0 2px;
  font-weight: 600;
  border-radius: 2px;
}

/* === FOOTER === */
.footer {
  margin-top: 40px;
  padding: 24px 0 32px;
  border-top: 1px solid var(--line);
  font-size: 11px;
  color: var(--ink-4);
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

/* === RESPONSIVE TWEAKS === */
@media (max-width: 480px) {
  .brand-mark { font-size: 19px; }
  .day-heading h2 { font-size: 22px; }
  .event-task { font-size: 14px; }
  .event-meta-row { font-size: 11px; }
}

/* Scroll into view for live event */
.event.live { scroll-margin-top: 200px; }
</style>
</head>

ge", "jour_label": "Mercredi 10 juin", "heure": "20:00", "tache": "Fin de journée toute team", "who": "", "where": "", "materiel": "", "notes": "", "zone": "", "heure_min": 1200, "heure_display": "20:00"}, {"jour": "10 juin", "date": "2026-06-10", "phase": "Démontage", "jour_label": "Mercredi 10 juin", "heure": "21:00", "tache": "Aller reporter le camion 10' et 20'", "who": "", "where": "", "materiel": "", "notes": "", "zone": "", "heure_min": 1260, "heure_display": "21:00"}];

const DAYS = [
  { date: '2026-06-02', label: 'Mar 2', name: 'Mardi', phase: 'Montage' },
  { date: '2026-06-03', label: 'Mer 3', name: 'Mercredi', phase: 'Montage' },
  { date: '2026-06-04', label: 'Jeu 4', name: 'Jeudi', phase: 'Montage' },
  { date: '2026-06-05', label: 'Ven 5', name: 'Vendredi', phase: 'Festival J1' },
  { date: '2026-06-06', label: 'Sam 6', name: 'Samedi', phase: 'Festival J2' },
  { date: '2026-06-07', label: 'Dim 7', name: 'Dimanche', phase: 'Festival J3' },
  { date: '2026-06-08', label: 'Lun 8', name: 'Lundi', phase: 'Festival J4' },
  { date: '2026-06-09', label: 'Mar 9', name: 'Mardi', phase: 'Démontage' },
  { date: '2026-06-10', label: 'Mer 10', name: 'Mercredi', phase: 'Démontage' },
];

let state = {
  activeDay: '2026-06-05',  // Festival J1 par défaut
  activeZone: 'Toutes',
  search: '',
};

// Get all distinct zones with counts
function getZones() {
  const dayEvents = EVENTS.filter(e => e.date === state.activeDay);
  const counts = {};
  dayEvents.forEach(e => {
    if (e.zone) counts[e.zone] = (counts[e.zone] || 0) + 1;
  });
  return Object.entries(counts).sort((a,b) => b[1] - a[1]);
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function highlight(text, query) {
  if (!query || !text) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(re, '<mark>$1</mark>');
}

function isLive(event) {
  // Vérifier si l'événement est "en cours" (date d'aujourd'hui et heure proche)
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);
  if (event.date !== todayStr) return false;
  const nowMin = now.getHours() * 60 + now.getMinutes();
  return event.heure_min > 0 && Math.abs(event.heure_min - nowMin) < 30;
}

function renderDays() {
  const nav = document.getElementById('daysNav');
  nav.innerHTML = DAYS.map(d => {
    const count = EVENTS.filter(e => e.date === d.date).length;
    const active = d.date === state.activeDay ? 'active' : '';
    return `<button class="day-btn ${active}" data-date="${d.date}">
      <span class="day-name">${d.name}</span>
      <span class="day-num">${d.label.split(' ')[1]}</span>
      <span class="day-phase">${d.phase}</span>
    </button>`;
  }).join('');
  nav.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.activeDay = btn.dataset.date;
      state.activeZone = 'Toutes';
      render();
    });
  });
}

function renderFilters() {
  const filters = document.getElementById('filters');
  const zones = getZones();
  const totalDay = EVENTS.filter(e => e.date === state.activeDay).length;
  let html = `<button class="chip ${state.activeZone === 'Toutes' ? 'active' : ''}" data-zone="Toutes">Toutes <span class="chip-count">${totalDay}</span></button>`;
  zones.forEach(([z, n]) => {
    const active = state.activeZone === z ? 'active' : '';
    html += `<button class="chip ${active}" data-zone="${escapeHtml(z)}">${escapeHtml(z)} <span class="chip-count">${n}</span></button>`;
  });
  filters.innerHTML = html;
  filters.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      state.activeZone = chip.dataset.zone;
      render();
    });
  });
}

function getFilteredEvents() {
  let evs = EVENTS.filter(e => e.date === state.activeDay);
  if (state.activeZone !== 'Toutes') {
    evs = evs.filter(e => e.zone === state.activeZone);
  }
  if (state.search) {
    const q = state.search.toLowerCase();
    evs = evs.filter(e => 
      (e.tache && e.tache.toLowerCase().includes(q)) ||
      (e.who && e.who.toLowerCase().includes(q)) ||
      (e.where && e.where.toLowerCase().includes(q)) ||
      (e.materiel && e.materiel.toLowerCase().includes(q)) ||
      (e.notes && e.notes.toLowerCase().includes(q))
    );
  }
  return evs;
}

function renderContent() {
  const day = DAYS.find(d => d.date === state.activeDay);
  const events = getFilteredEvents();
  const content = document.getElementById('content');
  
  let html = `
    <div class="day-heading">
      <h2>${day.name} ${day.label.split(' ')[1]} juin · ${day.phase}</h2>
      <div class="day-stats">${events.length} événement${events.length > 1 ? 's' : ''}</div>
    </div>
    <div class="events">
  `;
  
  if (events.length === 0) {
    html += `
      <div class="empty">
        <div class="empty-icon">∅</div>
        <div class="empty-title">Aucun événement</div>
        <div class="empty-sub">Essayez un autre filtre ou recherche</div>
      </div>
    `;
  } else {
    events.forEach(e => {
      const live = isLive(e) ? 'live' : '';
      const timeClass = e.heure_display === '—' ? 'no-time' : '';
      const q = state.search;
      
      let metaParts = [];
      if (e.who) metaParts.push(`<span><span class="label">Qui</span> <span class="value">${highlight(e.who, q)}</span></span>`);
      if (e.where) metaParts.push(`<span><span class="zone-tag">${escapeHtml(e.zone || e.where)}</span></span>`);
      if (e.materiel) metaParts.push(`<span><span class="label">Matériel</span> <span class="value">${highlight(e.materiel, q)}</span></span>`);
      
      html += `
        <article class="event ${live}">
          <div class="event-time ${timeClass}">${escapeHtml(e.heure_display)}</div>
          <div class="event-body">
            <div class="event-task">${highlight(e.tache, q)}</div>
            ${metaParts.length > 0 ? `<div class="event-meta-row">${metaParts.join('')}</div>` : ''}
            ${e.notes ? `<div class="event-notes">${highlight(e.notes, q)}</div>` : ''}
          </div>
        </article>
      `;
    });
  }
  
  html += `</div>`;
  content.innerHTML = html;
  
  // Scroll to live event if any
  const liveEl = content.querySelector('.event.live');
  if (liveEl && !state.search && state.activeZone === 'Toutes') {
    setTimeout(() => liveEl.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200);
  }
  
  document.getElementById('totalEvents').textContent = `${events.length} / ${EVENTS.filter(e => e.date === state.activeDay).length} affichés`;
}

function render() {
  renderDays();
  renderFilters();
  renderContent();
}

// Search
const searchInput = document.getElementById('searchInput');
const btnClear = document.getElementById('btnClear');
searchInput.addEventListener('input', e => {
  state.search = e.target.value.trim();
  btnClear.classList.toggle('visible', state.search.length > 0);
  renderContent();
});
btnClear.addEventListener('click', () => {
  searchInput.value = '';
  state.search = '';
  btnClear.classList.remove('visible');
  searchInput.focus();
  renderContent();
});

// "Now" button
document.getElementById('btnNow').addEventListener('click', () => {
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);
  // Trouver le jour du festival le plus proche d'aujourd'hui
  const matchDay = DAYS.find(d => d.date === todayStr);
  if (matchDay) {
    state.activeDay = todayStr;
  } else {
    // Si on n'est pas pendant le festival, aller à Festival J1 par défaut
    state.activeDay = '2026-06-05';
  }
  state.activeZone = 'Toutes';
  searchInput.value = '';
  state.search = '';
  btnClear.classList.remove('visible');
  render();
});

// Init
render();
</script>
